name: Docker multiarch publish

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_BUILD_RECORD_UPLOAD: "false"

jobs:
  buildandpush:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - java-version: "25"
            default-mc-version: "latest"
            tag-suffixes: "latest,java25,temurin25"
          - java-version: "21"
            default-mc-version: "1.21.11"
            tag-suffixes: "java21,temurin21"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image tags
        id: image-tags
        env:
          IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKERHUB_REPOSITORY }}
          TAG_SUFFIXES: ${{ matrix.tag-suffixes }}
        run: |
          {
            echo "tags<<EOF"
            printf '%s' "$TAG_SUFFIXES" | tr ',' '\n' | sed "s|^|$IMAGE_NAME:|"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          build-args: |
            JAVA_VERSION=${{ matrix.java-version }}
            DEFAULT_MC_VERSION=${{ matrix.default-mc-version }}
          push: true
          tags: ${{ steps.image-tags.outputs.tags }}
